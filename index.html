    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Unbounded:wght@600;800&display=swap" rel="stylesheet">
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('mafia_theme_v1');
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.dataset.theme = theme;
        } catch (e) {}
      })();
    </script>
